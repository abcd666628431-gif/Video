        .tab {

       .component-view ul { 
            display: grid; 
            grid-template-columns: repeat(1, minmax(0, 1fr)); 
            gap: 0.5rem; 
            padding: 0; 
            list-style: none;
            
            /* --- 新增這三行 --- */
            contain: content;           /* 核心優化：限制渲染邊界，不影響外部佈局 */
            perspective: 1000px;        /* 輔助 3D 硬體加速 */
            transform-style: preserve-3d; 
        }
        @media (min-width: 1024px) { .component-view ul { grid-template-columns: repeat(2, minmax(400px, 1fr)); } }
        .component-view li { 
            background: rgba(0, 0, 0, 0.2); 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: all 0.3s ease; 
            position: relative; 
            border-radius: 10px; 
            overflow: hidden; 
            display: flex; 
            align-items: stretch; 
            padding: 0; 
            gap: 0; 
            min-height: 195px; 
            height: auto; 

            /* --- 必須加入以下三行來防止滾動閃爍 --- */
            transform: translateZ(0);       /* 建立獨立 GPU 圖層 */
            backface-visibility: hidden;    /* 隱藏背面運算，減少重繪 */
            will-change: transform;         /* 提前告訴瀏覽器這層會動，鎖定快取 */
        }

                                                </div>
                                                <div className="mt-4 flex flex-row gap-6 items-end">
                                                    <div className="flex-1">
                                                        <label className="block text-[11px] font-black text-white/40 uppercase mb-2">-更新星期-</label>
                                                        {showTimeSettings ? <div className="flex flex-col gap-2"><div className="flex flex-row flex-nowrap gap-1 overflow-x-auto custom-scrollbar pb-1">{['一','二','三','四','五','六','日'].map(d => <button key={d} type="button" onClick={() => { const current = Array.isArray(formData.updateDay) ? formData.updateDay : []; const next = current.includes(d) ? current.filter(x => x !== d) : [...current, d]; setFormData({...formData, updateDay: next}); }} className={`watcher-tag !py-1 !px-2 !text-[9px] flex-shrink-0 ${Array.isArray(formData.updateDay) && formData.updateDay.includes(d) ? 'active' : ''}`}>{d}</button>)}</div></div> : <div className="plus-toggle-btn" onClick={() => setShowTimeSettings(true)}><Icon name="plus" className="w-4 h-4" /></div>}
                                                    </div>
                                                    <div className="flex-1">
                                                        <label className="block text-[11px] font-black text-[#ffbae9]/80 uppercase mb-2">-時間-</label>
                                                        {showTimeSettings ? (<TimeSelector value={formData.updateTime} onChange={(nt) => { setFormData({...formData, updateTime: nt}); if(!nt && (!formData.updateDay || formData.updateDay.length === 0)) setShowTimeSettings(false); }} />) : (<div className="plus-toggle-btn" onClick={() => setShowTimeSettings(true)}><Icon name="plus" className="w-4 h-4" /></div>)}
                                                    </div>
                                                </div>
                                                <div className="mt-4 grid grid-cols-2 gap-4">
                                                    <div className="col-span-1">
                                                        <label className="block text-[11px] font-black text-white/40 uppercase mb-2">-誰在看-</label>
                                                        <div className="inline-flex flex-wrap gap-1.5 p-1.5 bg-black/30 border border-white/5 rounded min-h-[36px] w-fit max-w-full">
                                                            {displayMembers.map(name => <div key={name} onClick={() => { const list = Array.isArray(formData.watchingBy) ? formData.watchingBy : []; const isSelected = list.includes(name); const newList = isSelected ? list.filter(n => n !== name) : [...list, name]; const newWP = { ...formData.watchedProgress }; if (!isSelected && !newWP[name]) newWP[name] = { ...emptyProgress }; setFormData({...formData, watchingBy: newList, watchedProgress: newWP}); }} className={`watcher-tag !py-1 !px-3 ${formData.watchingBy.includes(name) ? 'active' : ''}`}>{name}</div>)}
                                                        </div>
                                                    </div>
                                                    <div className="space-y-4">
                                                        <ProgressInputField label="已付費至" labelClass="text-yellow-400" value={formData.paidProgress} unitSuggestions={unitSuggestions} onChange={v=>setFormData({...formData, paidProgress: v})} />
                                                    </div>
                                                </div>
                                                <div className="mt-4 grid grid-cols-1 md:grid-cols-10 gap-4 items-start">
                                                    <div className="md:col-span-6 p-4 bg-cyan-400/5 border border-cyan-400/20 rounded space-y-4">
                                                        <span className="text-[10px] font-black text-cyan-400/60 uppercase tracking-widest">成員進度</span>
                                                        {formData.watchingBy.map(name => <ProgressInputField key={name} label={`${name} 的進度`} labelStyle={{ color: nameColorMap[name] || '#22d3ee' }} value={formData.watchedProgress[name] || { ...emptyProgress }} unitSuggestions={unitSuggestions} onChange={v => setFormData({ ...formData, watchedProgress: { ...formData.watchedProgress, [name]: v } })} />)}
                                                    </div>
                                                    <div className="md:col-span-4 space-y-4 md:pl-6">
                                                        <label className="block text-[10px] font-black text-white/30 uppercase tracking-tighter mb-2">-更新日期-</label>
                                                        {showManualUpdateInput ? <div className="flex items-center gap-1 bg-black/40 p-1 rounded border border-white/5 w-fit"><input className="bg-transparent outline-none w-[90px] font-black text-[11px] px-1 text-center" value={formData.manualUpdatedAt} onChange={e=>setFormData({...formData, manualUpdatedAt: e.target.value})} /><button type="button" onClick={() => setShowManualUpdateInput(false)} className="text-white/30 hover:text-red-400 p-0.5 rounded-full transition-colors"><Icon name="x" className="w-3.5 h-3.5" /></button></div> : <div className="plus-toggle-btn !w-full max-w-[120px]" onClick={() => setShowManualUpdateInput(true)}><Icon name="plus" className="w-4 h-4" /></div>}
                                                    </div>
                                                </div>
                                                <div className="mt-4 w-full">
                                                    <label className="block text-[11px] font-black text-white/40 uppercase mb-2">-連結-</label>
                                                    <input className="modal-input-base w-full font-mono text-[11px] text-cyan-500 pr-10 truncate" value={formData.url} onChange={e=>setFormData({...formData, url: e.target.value})} />
                                                </div>
                                                <div className="pt-4 flex flex-col md:flex-row gap-2 md:gap-4 border-t border-white/5 mt-4">
                                                    <button type="button" onClick={() => setIsModalOpen(false)} className="order-2 md:order-1 flex-1 py-3 bg-white/5 text-[11px] font-black rounded uppercase transition-all hover:bg-white/10">取消修改</button>
                                                    <button type="submit" disabled={isSaving} className={`order-1 md:order-2 flex-[2] py-3 font-black rounded shadow-lg uppercase text-[11px] transition-colors ${isSaving ? 'bg-white/20 text-white/50 cursor-not-allowed' : 'bg-[#ffbae9] text-[#3f5968] hover:bg-white'}`}>{isSaving ? '處理中...' : '確認提交'}</button>
                                                </div>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        } // <-- App 結尾

        const root = ReactDOM.createRoot(document.getElementById('root')); 
        root.render(<App />);
    </script>
</body>
</html>
