        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy, limit } from "https://gs.jurieo.com/gemini/gstatic/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef, useMemo, memo, useCallback } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyBowrV3MzZkXVRt-7kTK3dYuwU0Ce-uul0",
          authDomain: "video2-a50eb.firebaseapp.com",
          projectId: "video2-a50eb",

          messagingSenderId: "113893899942",
          appId: "1:113893899942:web:58fe57a9ab41ce13427e67"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'video-library-v1';

        const isMobileDevice = () => /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        const extractFirstNumber = (val) => {
            if (val === undefined || val === null || val === "") return 0;
            if (typeof val === 'object' && val.v1 !== undefined) return parseFloat(val.v1) || 0;
            const match = String(val).match(/(\d+(\.\d+)?)/);
            return match ? parseFloat(match[1]) : 0;
        };

        const calculateDualProgress = (cur, tot, updated) => {
            const c1 = parseFloat(cur?.v1) || 0, c2 = parseFloat(cur?.v2) || 0;
            let d1 = updated ? (parseFloat(updated?.v1) || parseFloat(tot?.v1) || 0) : (parseFloat(tot?.v1) || 0);
            let d2 = updated ? (parseFloat(updated?.v2) || parseFloat(tot?.v2) || 0) : (parseFloat(tot?.v2) || 0);
            if (d1 <= 0) return 0;
            if (c1 < d1) return Math.floor(Math.min(((c1 / d1) + ((c2 / 100) * (1 / d1))) * 100, 99)); 
            if (c1 >= d1) return (d2 > 0 && c1 === d1) ? Math.floor(Math.min((((d1 - 1) / d1) + ((Math.min(c2, d2) / d2) * (1 / d1))) * 100, 100)) : 100;
            return 100;
        };

        const formatProgressText = (prog) => {
            if (!prog || typeof prog !== 'object') return prog || "0";
            let parts = [];
            if (prog.v1 && prog.v1 !== "") parts.push(`${prog.v1}${prog.u1 || ''}`);
            if (prog.v2 && prog.v2 !== "") parts.push(`${prog.v2}${prog.u2 || ''}`);
            return parts.join(' ') || "0";
        };

        const formatDate = (ts, dateOnly = false) => { 
            if (!ts) return ""; 
            if (typeof ts === 'string') return ts;
            let date;
            try {
                if (ts?.toDate) date = ts.toDate();
                else if (ts?.seconds !== undefined) date = new Date(ts.seconds * 1000);
                else date = new Date(ts);
            } catch (e) { return "NOW"; }
            if (!date || isNaN(date.getTime())) return "NOW";
            const Y = date.getFullYear(), M = (date.getMonth() + 1).toString().padStart(2, '0'), D = date.getDate().toString().padStart(2, '0');
            if (dateOnly) return `${Y}-${M}-${D}`;
            return `${Y}-${M}-${D} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`; 
        };

        const tsNormalize = (str) => {
            if (!str) return "";
            const tradStr = "體國會愛萬與實鳥範機戰邊裡裏廣陽書劃劃畫對對進進導導燈燈門門問問開開蘭蘭慶慶國國層層陸錄劇電視飛觀藥優葉";
            const simpStr = "体国会爱万 with 实鸟范机战边里里广阳书划划画对對進進導導燈燈門門問問開開蘭蘭慶慶國國層層陸錄劇電視飛觀藥優葉";
            let res = str.toLowerCase();
            for(let i=0; i<tradStr.length; i++) {

            }
            return res;
        };

        const compressImage = (dataUrl, maxWidth = 800) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onerror = reject;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > maxWidth) { h = Math.round((h * maxWidth) / w); w = maxWidth; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                };
                img.src = dataUrl;
            });
        };

        const sanitizePayload = (obj, depth = 0) => {
            if (depth > 12) return null;
            if (obj === null || obj === undefined) return "";
            if (obj && typeof obj === 'object') {
                if (obj.hasOwnProperty('_methodName') || (obj.constructor && obj.constructor.name === 'FieldValueImpl')) {
                    return obj;
                }
                if (obj instanceof Date) return obj;
            }
            if (Array.isArray(obj)) {
                return obj.map(v => sanitizePayload(v, depth + 1));
            }
            if (typeof obj === 'object' && obj.constructor === Object) {
                const cleaned = {};
                Object.keys(obj).forEach(key => {
                    cleaned[key] = sanitizePayload(obj[key], depth + 1);
                });
                return cleaned;

            const handleMouseMove = (e) => {
                if (!isDragging.current) return;
                const dx = e.clientX - lastPos.current.x, dy = e.clientY - lastPos.current.y;
                setPosition(prev => ({ x: prev.x + dx, y: prev.y + dy }));
                lastPos.current = { x: e.clientX, y: e.clientY };
            };
            const handleMouseUp = () => { isDragging.current = false; };
            const handleWheel = (e) => {
                const step = 0.005; 
                setScale(prev => Math.max(0.01, Math.min(10, prev + (e.deltaY > 0 ? -step : step))));

                const displayRatio = img.offsetWidth / img.naturalWidth;

                        </div>
                    )}

                    {showDuplicateConfirm && (
                        <div className="fixed inset-0 z-[800] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
                            <div className="bg-[#0b0e14] border border-red-500/50 w-full max-sm p-10 rounded-sm text-center shadow-2xl">
                                <Icon name="alert-circle" className="w-12 h-12 text-red-500 mx-auto mb-4" />
                                <h4 className="text-red-500 font-black mb-2 uppercase text-lg tracking-widest">發現同名項目</h4>
                                <p className="text-sm text-slate-300 mb-8 font-bold leading-relaxed">資料庫中已存在名為 <span className="text-red-400">"{formData.name}"</span> 的檔案。<br/>您確定要建立/儲存同名項目嗎？</p>
                                <div className="flex gap-4"><button onClick={() => setShowDuplicateConfirm(false)} className="flex-1 py-3 bg-white/5 text-[12px] font-black rounded uppercase">返回修改</button><button onClick={proceedSave} className="flex-1 py-3 bg-red-600 text-white text-[12px] font-black rounded uppercase">仍要儲存</button></div>
                            </div>
                        </div>
                    )}

                    {isCropping && <ImageCropperModal imageSrc={rawImageData || formData.cover} onCrop={(c) => { setFormData(p => ({ ...p, cover: c })); setIsCropping(false); showNotify("封面已優化"); }} onCancel={() => setIsCropping(false)} />}
                    {deleteGameTarget && (
                        <div className="fixed inset-0 z-[700] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md"><div className="bg-[#0b0e14] border border-red-500/50 w-full max-sm p-10 rounded-sm text-center shadow-2xl"><Icon name="alert-triangle" className="w-12 h-12 text-red-500 mx-auto mb-4" /><h4 className="text-red-500 font-black mb-2 uppercase text-lg">確認刪除？</h4><p className="text-sm text-slate-300 mb-8 font-bold italic">{String(deleteGameTarget.name)}</p><div className="flex gap-4"><button onClick={() => setDeleteGameTarget(null)} className="flex-1 py-3 bg-white/5 text-[12px] font-black rounded uppercase">取消</button><button onClick={() => handleDeleteGame(deleteGameTarget.id)} className="flex-1 py-3 bg-red-600 text-white text-[12px] font-black rounded uppercase">確定</button></div></div></div>
                    )}
                    {showClearConfirm && (
                        <div className="fixed inset-0 z-[600] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm"><div className="bg-[#0b0e14] border border-red-500/30 w-full max-w-xs p-8 rounded-sm shadow-2xl text-center"><h4 className="text-red-500 font-black mb-4 uppercase tracking-widest">警告：清空全部數據</h4><p className="text-xs text-white/40 mb-8 px-2">確定要清空所有內容嗎？此操作不可撤銷。</p><div className="flex gap-3"><button onClick={() => setShowClearConfirm(false)} className="flex-1 py-2 bg-white/5 text-[11px] font-black rounded">取消</button><button onClick={handleClearAllData} className="flex-1 py-2 bg-red-600 text-white text-[11px] font-black rounded">確定</button></div></div></div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
