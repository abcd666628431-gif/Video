<body>
    <div id="root"></div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://gs.jurieo.com/gemini/gstatic/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://gs.jurieo.com/gemini/gstatic/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy } from "https://gs.jurieo.com/gemini/gstatic/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef, useMemo, memo, useCallback } = React;

        // --- Firebase Config & Initialization ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'video-library-v1';

        // --- Helpers ---
        const isMobileDevice = () => /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        const extractFirstNumber = (val) => {
            if (val === undefined || val === null || val === "") return 0;
            if (typeof val === 'object' && val.v1 !== undefined) return parseFloat(val.v1) || 0;
            const match = String(val).match(/(\d+(\.\d+)?)/);
            return match ? parseFloat(match[1]) : 0;
        };

        const calculateDualProgress = (cur, tot) => {
            const c1 = parseFloat(cur?.v1) || 0, c2 = parseFloat(cur?.v2) || 0;
            const t1 = parseFloat(tot?.v1) || 0, t2 = parseFloat(tot?.v2) || 0;
            if (t1 <= 0) return 0;
            if (c1 < t1) return Math.floor(Math.min(((c1 / t1) + ((c2 / 100) * (1 / t1))) * 100, 99)); 
            if (c1 === t1) return t2 > 0 ? Math.floor(Math.min((((t1 - 1) / t1) + ((Math.min(c2, t2) / t2) * (1 / t1))) * 100, 100)) : 100;
            return 100;
        };

        const formatProgressText = (prog) => {
            if (!prog || typeof prog !== 'object') return prog || "0";
            let parts = [];
            if (prog.v1 && prog.v1 !== "") parts.push(`${prog.v1}${prog.u1 || ''}`);
            if (prog.v2 && prog.v2 !== "") parts.push(`${prog.v2}${prog.u2 || ''}`);
            return parts.join(' ') || "0";
        };

        const formatDate = (ts, dateOnly = false) => { 
            if (!ts) return ""; 
            let date;
            try {
                if (ts?.toDate) date = ts.toDate();
                else if (ts?.seconds !== undefined) date = new Date(ts.seconds * 1000);
                else date = new Date(ts);
            } catch (e) { return "NOW"; }
            if (!date || isNaN(date.getTime())) return "NOW";
            const Y = date.getFullYear(), M = (date.getMonth() + 1).toString().padStart(2, '0'), D = date.getDate().toString().padStart(2, '0');
            if (dateOnly) return `${Y}-${M}-${D}`;
            return `${Y}-${M}-${D} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`; 
        };

        const tsNormalize = (str) => {
            if (!str) return "";
            const tradStr = "體國會愛萬與實鳥範機戰邊裡裏廣陽書劃劃畫對對進進導導燈燈門門問問開開蘭蘭慶慶國國層層陸錄劇電視飛觀藥優葉";
            const simpStr = "体国会爱万与实鸟范机战边里里广阳书划划画对对進進導導燈燈門門問問開開蘭蘭慶慶國國層層陸錄劇電視飛觀藥優葉";
            let res = str.toLowerCase();
            for(let i=0; i<tradStr.length; i++) {
                res = res.replace(new RegExp(tradStr[i], 'g'), simpStr[i]);
            }
            return res;
        };

        const compressImage = (dataUrl, maxWidth = 800) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onerror = reject;
                img.onload = () => {

                onlineUsers.forEach(u => { if(u.name) m[u.name] = u.color; });
                m[userName] = userColor; m["糖糖"] = "#ffbae9"; m["雲雲"] = "#47daff";
                return m; 
            }, [onlineUsers, userProfiles, userName, userColor]);

            const displayMembers = ["糖糖", "雲雲"];
            const isNameDuplicate = useMemo(() => {
                const currentName = formData.name.trim();
                return !!currentName && games.some(g => g.name.trim() === currentName && g.id !== editingId);
            }, [formData.name, games, editingId]);

            const logActivity = useCallback(async (action, gameName, gameOrder) => { 
                if(!user) return; 
                try { await addDoc(getPublicCol('activity_logs'), { userName, action, gameName, gameOrder: gameOrder || '', timestamp: serverTimestamp() }); } catch(e) {} 
            }, [user, userName]);

            const handleAddGroup = async () => { const n = newGroupName.trim(); if(!n || !user || customCategories.includes(n)) return; await setDoc(doc(getPublicCol('settings'), 'config'), { categories: [...customCategories, n] }, { merge: true }); setNewGroupName(''); setIsAddGroupModalOpen(false); showNotify("分組已新增"); };
            const handleDeleteGroup = async () => { if(!user || !activeTab) return; await setDoc(doc(getPublicCol('settings'), 'config'), { categories: customCategories.filter(c => c !== activeTab) }, { merge: true }); setActiveTab(null); showNotify("分組已刪除"); };
            const handleRenameGroup = async () => {
                if(!user || !activeTab || ["最新入庫", "編號排序"].includes(activeTab)) return;
                const newName = prompt("請輸入分類的新名稱：", activeTab);
                if (!newName || newName.trim() === "" || newName.trim() === activeTab) return;
                const trimmed = newName.trim();
                const updated = customCategories.map(c => c === activeTab ? trimmed : c);
                try {
                    await setDoc(doc(getPublicCol('settings'), 'config'), { categories: updated }, { merge: true });
                    const affected = games.filter(g => g.category === activeTab);
                    await Promise.all(affected.map(g => updateDoc(doc(getPublicCol('games'), g.id), { category: trimmed })));
                    setActiveTab(trimmed); showNotify("分類名稱已更新");
                } catch (e) { showNotify("更新失敗"); }
            };

            const handleOpenAddModal = useCallback(() => {
                setEditingId(null); setRawImageData(null); 
                setFormData({ name: '', notes: '', addedBy: userName, year: '', order: (games.length + 1).toString(), url: '', cover: null, totalEpisodes: { ...emptyProgress }, watchedProgress: {}, updatedEpisodes: { ...emptyProgress }, paidProgress: { ...emptyProgress, u2: '章' }, airingStatus: '連載中', source: '', category: '', sourceIcon: '', manualUpdatedAt: '', watchingBy: [], updateDay: '', updateTime: '' }); 
                setShowTimeSettings(false); setShowManualUpdateInput(false); setIsModalOpen(true); 
            }, [userName, games.length]);

            const handleOpenEdit = useCallback((item) => {
                setEditingId(item.id); setRawImageData(item.cover); 
                const ensureP = (v) => v?.v1 !== undefined ? { ...emptyProgress, ...v } : { ...emptyProgress, v1: v || '' }; 
                const sObj = customSources.find(s => s.name === item.source);
                let newWatchedProgress = {};
                const currentWatchingBy = Array.isArray(item.watchingBy) ? item.watchingBy : (item.watchingBy ? [item.watchingBy] : []);
                if (item.watchedProgress && item.watchedProgress.v1 !== undefined) {
                    if (currentWatchingBy.length > 0) { newWatchedProgress[currentWatchingBy[0]] = ensureP(item.watchedProgress); }
                } else if (item.watchedProgress) {
                    Object.keys(item.watchedProgress).forEach(name => { newWatchedProgress[name] = ensureP(item.watchedProgress[name]); });
                }
                setFormData({ ...item, sourceIcon: sObj ? sObj.icon : '', totalEpisodes: ensureP(item.totalEpisodes), watchedProgress: newWatchedProgress, updatedEpisodes: ensureP(item.updatedEpisodes), paidProgress: ensureP(item.paidProgress), notes: item.notes || '', manualUpdatedAt: item.manualUpdatedAt || '', watchingBy: currentWatchingBy }); 
                setShowTimeSettings(!!(item.updateDay || item.updateTime)); setShowManualUpdateInput(!!item.manualUpdatedAt); setIsModalOpen(true); 
            }, [customSources]);

            const proceedSave = async () => {
                setShowDuplicateConfirm(false);
                const cn = formData.name.trim();
                try {
                    const to = formData.order === "" ? 1 : extractFirstNumber(formData.order);
                    if(formData.source.trim()) { 
                        let sources = [...customSources]; const idx = sources.findIndex(s => s.name === formData.source.trim()); 
                        if(idx === -1) sources.push({ name: formData.source.trim(), icon: formData.sourceIcon || '' }); 
                        else sources[idx].icon = formData.sourceIcon || ''; 
                        await setDoc(doc(getPublicCol('settings'), 'config'), { sources, categories: customCategories }, { merge: true }); 
                    }
                    const { sourceIcon, ...cleanData } = formData;
                    const finalData = { ...cleanData, name: cn, source: formData.source.trim(), addedBy: String(formData.addedBy || userName), order: to, updatedAt: serverTimestamp() }; 
                    if(editingId) { await setDoc(doc(getPublicCol('games'), editingId), finalData, { merge: true }); logActivity("修改", cn, to); } 
                    else { await addDoc(getPublicCol('games'), { ...finalData, createdAt: serverTimestamp() }); logActivity("錄入", cn, to); }
                    showNotify("資料已儲存"); setIsModalOpen(false); setEditingId(null);
                } catch(e) { showNotify("操作失敗"); }
            };

            const handleSaveGame = (e) => {
                if(e) e.preventDefault(); 
                if (isNameDuplicate && !showDuplicateConfirm) { setShowDuplicateConfirm(true); return; }
                proceedSave();
            };

            const handleDeleteGame = async (id) => { 
                if(!user) return; setDeleteGameTarget(null);
                try {
                    const g = games.find(x => x.id === id); 
                    await deleteDoc(doc(getPublicCol('games'), id)); logActivity("刪除", g?.name || "未知", g?.order); showNotify("已刪除"); 
                } catch (e) { showNotify("刪除失敗"); }
            };

            const handleClearAllData = async () => { 
                if(!user) return; setShowClearConfirm(false); 
                try { 
                    const querySnapshot = await getDocs(getPublicCol('games'));
                    await Promise.all(querySnapshot.docs.map(docSnap => deleteDoc(doc(getPublicCol('games'), docSnap.id))));
                    showNotify("數據已徹底抹除"); logActivity("清空全庫", "全部內容", "ALL");
                } catch(e) { showNotify("清空程序異常"); } 
            };

            const handleExportData = () => { 
                const sorted = [...games].sort((a, b) => extractFirstNumber(a.order) - extractFirstNumber(b.order));
                const blob = new Blob([JSON.stringify({ version: "11.6", games: sorted, categories: customCategories, sources: customSources }, null, 2)], { type: 'application/json' }); 
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup_${Date.now()}.json`; a.click(); 
            };
            
            const handleImportData = async (e) => {
                const f = e.target.files[0]; if(!f || !user) return; const r = new FileReader();
                r.onload = async (ev) => { 
                    try { 
                        const d = JSON.parse(ev.target.result); 
                        if(d.games) for(const g of d.games) await setDoc(g.id ? doc(getPublicCol('games'), g.id) : doc(getPublicCol('games')), { ...g, updatedAt: serverTimestamp() }, { merge: true });
                        if(d.categories || d.sources) await setDoc(doc(getPublicCol('settings'), 'config'), { categories: d.categories || customCategories, sources: d.sources || customSources }, { merge: true }); 
                        showNotify("導入成功"); 
                    } catch(e) { showNotify("導入失敗"); } 
                }; 
                r.readAsText(f);
            };

            const handleReorderIDs = async () => {
                if (!user || games.length === 0) return;
                try {
                    showNotify("正在強制校正編號系統...");
                    const sorted = [...games].sort((a, b) => extractFirstNumber(a.order) - extractFirstNumber(b.order) || (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                    await Promise.all(sorted.map((g, idx) => updateDoc(doc(getPublicCol('games'), g.id), { order: idx + 1 })));
                    logActivity("全局校正編號", `總數 ${sorted.length} 項`, "REFIX"); showNotify(`校正完成！`);
                } catch (e) { showNotify("校正失敗"); }
            };

            const filteredGames = useMemo(() => {
                let l = [...games]; const q = searchQuery.toLowerCase().trim(); 
                if(q) {
                    const qNorm = tsNormalize(q);
                    l = l.filter(g => tsNormalize((g.name || "").toLowerCase()).includes(qNorm) || tsNormalize((g.category || "").toLowerCase()).includes(qNorm) || String(g.order) === q.replace('#',''));
                }
                if (memberFilter) {
                    l = l.filter(g => {
                        const watchers = Array.isArray(g.watchingBy) ? g.watchingBy : (g.watchingBy ? [g.watchingBy] : []);
                        if (!watchers.includes(memberFilter.name)) return false;
                        if (memberFilter.type === 'progress') {
                            const prog = g.watchedProgress?.[memberFilter.name] || { v1: 0, v2: 0 };
                            const p = calculateDualProgress(prog, g.updatedEpisodes);
                            if (memberFilter.value === 'unstarted') return p === 0;
                            if (memberFilter.value === 'watching') return p > 0 && p < 100;
                            if (memberFilter.value === 'completed') return p >= 100;
                        }
                        if (memberFilter.type === 'category') return (g.category || "未分類") === memberFilter.value;
                        if (memberFilter.type === 'source') return (g.source || "未知來源") === memberFilter.value;
                        return true;
                    });
                }
                if(activeTab === "最新入庫") l.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                else { 
                    if(activeTab && activeTab !== "編號排序") l = l.filter(g => g.category === activeTab); 
                    l.sort((a,b) => extractFirstNumber(a.order) - extractFirstNumber(b.order)); 
                }
                return l;
            }, [games, searchQuery, activeTab, memberFilter]);

            const memberStats = useMemo(() => {
                const sm = {}; 
                games.forEach(g => { 
                    const w = Array.isArray(g.watchingBy) ? g.watchingBy : (g.watchingBy ? [g.watchingBy] : []); 
                    w.forEach(n => { 
                        if(!sm[n]) sm[n] = { total: 0, unstarted: 0, watching: 0, completed: 0, cats: {}, sources: {} }; 
                        sm[n].total++; 
                        const prog = g.watchedProgress?.[n] || { v1: 0, v2: 0 };
                        const p = calculateDualProgress(prog, g.updatedEpisodes); 
                        if(p === 0) sm[n].unstarted++; else if(p >= 100) sm[n].completed++; else sm[n].watching++; 
                        const c = g.category || "未分類"; sm[n].cats[c] = (sm[n].cats[c] || 0) + 1;
                        const s = g.source || "未知來源"; sm[n].sources[s] = (sm[n].sources[s] || 0) + 1;
                    }); 
                }); 
                return Object.keys(sm).sort().map(n => ({ name: n, color: nameColorMap[n] || '#ffffff', stats: sm[n] }));
            }, [games, nameColorMap]);

            const activeCategoriesInUse = useMemo(() => {
                const sums = {}; memberStats.forEach(m => Object.entries(m.stats.cats).forEach(([cat, count]) => { sums[cat] = (sums[cat] || 0) + count; }));
                return Object.keys(sums).sort((a, b) => sums[b] - sums[a]);
            }, [memberStats]);
            
            const activeSourcesInUse = useMemo(() => {
                const sums = {}; memberStats.forEach(m => Object.entries(m.stats.sources).forEach(([src, count]) => { sums[src] = (sums[src] || 0) + count; }));
                return Object.keys(sums).sort((a, b) => sums[b] - sums[a]);
            }, [memberStats]);

            const toggleMemberFilter = useCallback((name, type, value) => {
                setMemberFilter(prev => (prev?.name === name && prev?.type === type && prev?.value === value) ? null : { name, type, value });
            }, []);

            return (
                <div className="min-h-screen p-4 md:p-8 relative text-white pb-24">
                    {notification && <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] bg-[#ffbae9] text-[#3f5968] font-black px-6 py-2 rounded-full border-2 border-white shadow-2xl">{notification}</div>}
                    
                    <div className="max-w-[1800px] mx-auto">
                        <header className="mb-8 flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-6"><TitleIcon /><div><div className="flex items-center gap-2 mb-1"><div className="w-2 h-2 bg-[#ffbae9]"></div><span className="text-xs font-black text-white/60 tracking-widest uppercase">Anime Matrix v11.6</span></div><h1 className="text-4xl md:text-5xl font-black uppercase tracking-tighter">影片 <span className="animate-text-shimmer">庫統計系統</span></h1></div></div>
                            <div className="flex items-center gap-3"><div className="flex items-center gap-2 px-4 py-2 border rounded text-xs font-black bg-black/20 border-white/20"><Icon name="refresh-cw" className="w-4 h-4" /> <div className="flex flex-col"><span className="uppercase text-[10px]">即時同步中</span><span className="text-[10px] text-white/40 font-bold">{formatDate(new Date())}</span></div></div>{!isEditLocked && <button onClick={() => setShowClearConfirm(true)} className="flex items-center gap-2 px-4 py-2 bg-red-900/40 border border-red-500/30 text-red-100 text-xs font-black rounded hover:bg-red-600 uppercase transition-all shadow-lg"><Icon name="trash-2" className="w-4 h-4" /> 清除</button>}</div>
                        </header>
                        
                        <div className="grid grid-cols-1 lg:grid-cols-10 gap-6 mb-8">
                            <div className="lg:col-span-4 dashboard-panel h-[180px] overflow-hidden flex flex-col"><div className="flex items-center gap-2 mb-2 border-b border-white/5 pb-1 font-black text-white/50 text-xs uppercase"><Icon name="history" className="w-4 h-4 text-[#ffbae9]" /> 操作日誌</div><div className="flex-1 overflow-y-auto custom-scrollbar font-mono text-[13px] space-y-1 text-white/70">
                                {activityLogs.map(l => (
                                    <div key={l.id} className="border-b border-white/5 pb-0.5">
                                        <span className="text-white/30 text-[10px] mr-2">[{formatDate(l.timestamp).split(' ')[1]}]</span> 
                                        <span className="font-bold" style={{ color: nameColorMap[l.userName] || '#fff' }}>{l.userName}</span> <span className="mx-1">{l.action}</span> 
                                        <span className="font-black">{l.gameOrder && <span className="text-[#ffbae9] mr-1">[#{l.gameOrder}]</span>}"{l.gameName}"</span>
                                    </div>
                                ))}
                            </div></div>
                            <div className="lg:col-span-1 dashboard-panel h-[180px] flex flex-col gap-3"><div className="flex justify-between items-center text-xs font-black text-white/50 uppercase"><span>在線</span><span className="text-xl font-black text-white">{onlineUsers.length}</span></div><div className="bg-black/20 border border-white/5 p-2 flex-1 overflow-y-auto custom-scrollbar text-[11px] rounded flex flex-wrap gap-2">{onlineUsers.map(u => <span key={u.uid} style={{ color: u.color }} className="font-black">● {u.name}</span>)}</div><div className="flex justify-between items-center pt-1 border-t border-white/5"><div className="flex items-center gap-2 cursor-pointer" onClick={() => setIsEditingName(true)}>{isEditingName ? <input autoFocus className="bg-black border-b border-[#ffbae9] text-[11px] w-20 outline-none" defaultValue={userName} onBlur={e => { setUserName(e.target.value.trim()||userName); setIsEditingName(false); }} /> : <span className="text-xs font-black" style={{ color: userColor }}>{userName}</span>}<Icon name="edit-3" className="w-3 h-3 text-white/20" /></div><input type="color" className="w-6 h-6 bg-transparent cursor-pointer" value={userColor} onChange={e => setUserColor(e.target.value)} /></div></div>
                            <div className="lg:col-span-5 dashboard-panel h-[180px] relative flex flex-col"><div className="absolute top-0 left-0 w-full h-[2px] bg-[#ffbae9]"></div><div className="flex justify-between items-center mb-2 text-xs font-black text-white/50 uppercase tracking-widest"><div className="flex items-center gap-3"><span>成員統計</span><Icon name="download" className="w-3.5 h-3.5 hover:text-white" onClick={handleExportData} /><Icon name="upload" className="w-3.5 h-3.5 hover:text-white" onClick={() => importInputRef.current.click()} /><input type="file" ref={importInputRef} className="hidden" accept=".json" onChange={handleImportData} /></div><div className="flex items-center gap-2"><Icon name="shuffle" className={`w-3.5 h-3.5 cursor-pointer transition-colors ${statMode !== 'progress' ? 'text-[#ffbae9]' : 'text-white/40 hover:text-white'}`} onClick={() => setStatMode(prev => prev === 'progress' ? 'category' : prev === 'category' ? 'source' : 'progress')} /><div className="text-[10px] opacity-40">總存檔數: {games.length}</div></div></div><div className="flex-1 overflow-x-auto custom-scrollbar pr-1"><table className="w-full text-[11px] font-black border-collapse min-w-[300px]">
                                {statMode === 'progress' ? (
                                    <>
                                        <thead><tr className="text-left text-white/30 border-b border-white/5"><th className="pb-1">成員</th><th className="pb-1 text-center">總計</th><th className="pb-1 text-center">追完更新</th><th className="pb-1 text-center text-cyan-400">追更中</th><th className="pb-1 text-center text-green-400">未開始</th></tr></thead>
                                        <tbody>{memberStats.map(m => (
                                                <tr key={m.name} className="border-b border-white/5 hover:bg-white/5">
                                                    <td className="py-1.5 whitespace-nowrap" style={{ color: m.color }}>{m.name}</td>
                                                    <td onClick={() => toggleMemberFilter(m.name, 'progress', 'total')} className={`py-1.5 text-center cursor-pointer hover:bg-white/10 ${memberFilter?.name===m.name && memberFilter?.value==='total' ? 'bg-[#ffbae9]/20 text-[#ffbae9]' : ''}`}>{m.stats.total}</td>
                                                    <td onClick={() => toggleMemberFilter(m.name, 'progress', 'completed')} className="py-1.5 text-center cursor-pointer hover:bg-white/10 text-green-400">{m.stats.completed}</td>
                                                    <td onClick={() => toggleMemberFilter(m.name, 'progress', 'watching')} className="py-1.5 text-center cursor-pointer hover:bg-white/10 text-cyan-400">{m.stats.watching}</td>
                                                    <td onClick={() => toggleMemberFilter(m.name, 'progress', 'unstarted')} className="py-1.5 text-center cursor-pointer hover:bg-white/10">{m.stats.unstarted}</td>
                                                </tr>
                                        ))}</tbody>
                                    </>
                                ) : (
                                    <>
                                        <thead><tr className="text-left text-white/30 border-b border-white/5"><th className="pb-1 sticky left-0 bg-[#314a58]/95 z-10 whitespace-nowrap pr-4">成員</th>{(statMode==='category'?activeCategoriesInUse:activeSourcesInUse).map(c => <th key={c} className="pb-1 text-center px-2 min-w-[80px] whitespace-nowrap">{c}</th>)}</tr></thead>
                                        <tbody>{memberStats.map(m => (
                                                <tr key={m.name} className="border-b border-white/5 hover:bg-white/5">
                                                    <td className="py-1.5 sticky left-0 bg-[#314a58]/95 z-10 whitespace-nowrap pr-4" style={{ color: m.color }}>{m.name}</td>
                                                    {(statMode==='category'?activeCategoriesInUse:activeSourcesInUse).map(c => {
                                                        const count = (statMode==='category' ? m.stats.cats[c] : m.stats.sources[c]) || 0;
                                                        return <td key={c} onClick={() => count > 0 && toggleMemberFilter(m.name, statMode, c)} className={`py-1.5 text-center transition-colors ${count > 0 ? 'text-[#ffbae9] cursor-pointer hover:bg-white/10' : 'opacity-20'}`}>{count}</td>;
                                                    })}
                                                </tr>
                                        ))}</tbody>
                                    </>
                                )}
                            </table></div></div>
                        </div>

                        <div className="flex flex-col md:flex-row items-stretch md:items-center bg-black/20 border border-white/10 rounded-t-lg overflow-hidden shadow-xl">
                            {!isEditLocked && <button onClick={handleOpenAddModal} className="px-10 py-5 bg-[#ffbae9] text-[#3f5968] font-black border-l-8 border-white uppercase tracking-widest text-sm transition-all hover:bg-white">+ 錄入新內容</button>}
                            <div className="flex-grow flex items-center px-8 border-y md:border-y-0 border-white/5 py-4 md:py-0"><Icon name="search" className="w-5 h-5 text-white/40 mr-4" /><input type="text" placeholder="搜尋標題、編號(如#1)或分類..." className="bg-transparent outline-none uppercase font-black tracking-widest text-sm flex-grow placeholder:text-white/20" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} /></div>
                            {memberFilter && <div className="px-4 py-2 flex items-center"><button onClick={() => setMemberFilter(null)} className="px-3 py-1 bg-[#ffbae9]/10 border border-[#ffbae9]/30 text-[#ffbae9] text-[10px] font-black rounded flex items-center gap-2">篩選: {memberFilter.name} <Icon name="x" className="w-3 h-3" /></button></div>}
                            <div className="px-8 flex items-center justify-end py-4 md:py-0 gap-3">
                                {!isEditLocked && <button onClick={handleReorderIDs} className="px-4 py-2 bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 rounded-full font-black text-[10px] uppercase flex items-center gap-2"><Icon name="list-ordered" className="w-3 h-3" /> 校正編號</button>}
                                <button onClick={() => setIsEditLocked(!isEditLocked)} className={`px-6 py-2 rounded-full font-black text-xs border transition-all ${isEditLocked ? 'text-[#ffbae9] border-[#ffbae9]/50 bg-[#ffbae9]/10' : 'text-green-300 border-green-500/50 bg-green-500/10'}`}><Icon name={isEditLocked ? "lock" : "unlock"} className="w-3 h-3 mr-2 inline" /> {isEditLocked ? "唯讀模式" : "管理模式"}</button>
                            </div>
                        </div>

                        <article className="tab-content bg-black/10 border-x border-b border-white/10 p-6 rounded-b-lg shadow-2xl">
                            <nav className="tab-bar">
                                {customCategories.map((cat, idx) => (<div key={idx} className={`tab ${activeTab === cat ? 'active' : ''}`} onClick={() => setActiveTab(prev => prev === cat ? null : cat)}>{cat}</div>))}
                                <div className="ml-auto flex gap-2 pr-2">
                                    {!isEditLocked && activeTab && !["最新入庫", "編號排序"].includes(activeTab) && (
                                        <>
                                            <div className="tab-action-btn btn-edit" onClick={handleRenameGroup}><Icon name="edit-3" className="w-4 h-4" /></div>
                                            <div className="tab-action-btn btn-minus" onClick={handleDeleteGroup}><Icon name="minus" className="w-4 h-4" /></div>
                                        </>
                                    )}
                                    {!isEditLocked && <div className="tab-action-btn btn-plus" onClick={() => setIsAddGroupModalOpen(true)}><Icon name="plus" className="w-4 h-4" /></div>}
                                </div>
                            </nav> 
                            <div className="component-view">
                                <ul>{isLoadingGames ? <div className="col-span-full py-20 text-center animate-pulse text-white/20 font-black">SYNCHRONIZING...</div> : filteredGames.length === 0 ? <div className="col-span-full py-20 text-center text-white/10 font-black uppercase">目前無資料</div> : filteredGames.map(g => (
                                    <GameCard key={g.id} g={g} nameColorMap={nameColorMap} allSources={customSources} isEditLocked={isEditLocked} onOpenEdit={handleOpenEdit} onDelete={setDeleteGameTarget} />
                                ))}</ul>
                            </div> 
                        </article>
                    </div>

                    <div className="fab-btn-container">
                        <div className="fab-btn-sub" onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}><Icon name="chevron-up" className="w-6 h-6" /></div>
                        {!isEditLocked && <div className="fab-btn-sub !bg-red-600/40" onClick={() => setIsEditLocked(true)}><Icon name="lock" className="w-5 h-5" /></div>}
                        <div className="fab-btn-main" onClick={() => isEditLocked ? setIsEditLocked(false) : handleOpenAddModal()}>
                            <Icon name={isEditLocked ? "lock" : "plus"} className="w-8 h-8" />
                        </div>
                        <div className="fab-btn-sub" onClick={() => window.scrollTo({top: document.documentElement.scrollHeight, behavior: 'smooth'})}><Icon name="chevron-down" className="w-6 h-6" /></div>
                    </div>

                    {isAddGroupModalOpen && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                            <div className="bg-[#0b0e14] border border-white/20 p-6 rounded w-full max-w-xs text-center"><h4 className="text-sm font-black mb-4 uppercase tracking-widest">新增分組</h4><input autoFocus className="modal-input-base w-full mb-4" value={newGroupName} onChange={e=>setNewGroupName(e.target.value)} /><div className="flex gap-2"><button onClick={() => setIsAddGroupModalOpen(false)} className="flex-1 py-2 bg-white/5 text-[10px] font-black rounded border border-white/5">取消</button><button onClick={handleAddGroup} className="flex-1 py-2 bg-[#ffbae9] text-[#3f5968] text-[10px] font-black rounded shadow-lg">新增</button></div></div>
                        </div>
                    )}

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm overflow-y-auto">
                            <div className="bg-[#0b0e14] border border-white/10 w-full max-w-3xl my-auto md:my-8 relative rounded-sm max-h-[95vh] flex flex-col shadow-2xl">
                                <div className="absolute top-0 left-0 w-full h-1 bg-[#ffbae9]"></div>
                                <button onClick={() => setIsModalOpen(false)} className="absolute right-4 top-4 text-slate-600 hover:text-white z-10"><Icon name="x" className="w-5 h-5" /></button>
                                <div className="p-4 md:p-8 overflow-y-auto custom-scrollbar flex-1">
                                    <h3 className="text-xl md:text-2xl font-black italic mb-8 underline decoration-[#ffbae9]/30 decoration-4 uppercase tracking-tighter">{editingId ? 'Modify' : 'New Entry'} 資料卡</h3>
                                    <form onSubmit={handleSaveGame} className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-12 gap-8">
                                            {/* 左側封面區域 */}
                                            <div className="md:col-span-4 space-y-4">
                                                <div className="flex gap-3 items-end">
                                                    <div className="flex-shrink-0 mb-1">
                                                        <label className="block text-[10px] font-black text-white/40 uppercase mb-1.5">編號</label>
                                                        <input className="modal-input-base w-[52px] text-center font-black p-1 text-sm" value={formData.order} onChange={e=>setFormData({...formData, order: e.target.value})} />
                                                    </div>
                                                    <div className="flex-grow flex flex-col items-center">
                                                        <div onClick={() => { setLastSelectedImgZone('cover'); if(isMobileDevice()) fileInputRef.current?.click(); }} className={`w-32 md:w-36 aspect-[3/4] bg-black/20 border border-white/10 rounded flex items-center justify-center cursor-pointer overflow-hidden group hover:border-[#ffbae9] transition-all shadow-xl ${lastSelectedImgZone === 'cover' ? 'border-[#ffbae9] ring-2 ring-[#ffbae9]/20' : ''}`}>
                                                            {formData.cover ? <img src={formData.cover} className="w-full h-full object-contain" /> : <div className="text-[10px] text-white/20 group-hover:text-[#ffbae9] font-black uppercase text-center p-2">貼上圖(連結)</div>}
                                                        </div>
                                                        {formData.cover && <button type="button" onClick={() => setIsCropping(true)} className="mt-2 text-[11px] font-black uppercase text-white/40 hover:text-[#ffbae9] flex items-center gap-1"><Icon name="scissors" className="w-3 h-3" />裁剪優化</button>}
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2">
                                                    <div>
                                                        <label className="block text-[10px] font-black text-white/40 uppercase mb-1.5">狀態</label>
                                                        <select className="modal-input-base w-full text-[11px] font-black px-2" value={formData.airingStatus} onChange={e=>setFormData({...formData, airingStatus: e.target.value})}>
                                                            {["連載中", "已完結", "待播出"].map(s=><option key={s} value={s}>{s}</option>)}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block text-[10px] font-black text-white/40 uppercase mb-1.5">年份</label>
                                                        <input className="modal-input-base w-full text-center font-black p-1 text-[11px]" value={formData.year} onChange={e=>setFormData({...formData, year: e.target.value})} />
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-black text-white/40 uppercase mb-1.5">分類</label>
                                                    <select className="modal-input-base w-full text-[11px] font-bold px-2" value={formData.category} onChange={e=>setFormData({...formData, category: e.target.value})}>
                                                        <option value="">- 分類 -</option>
                                                        {customCategories.map(c=><option key={c} value={c}>{c}</option>)}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-black text-white/40 uppercase mb-1.5">來源</label>
                                                    <div className="flex gap-2 items-center">
                                                        <div onClick={() => { setLastSelectedImgZone('source'); if(isMobileDevice()) fileInputRef.current?.click(); }} className={`source-icon-preview-box !w-8 !h-8 ${lastSelectedImgZone === 'source' ? 'active' : ''}`}>
                                                            {formData.sourceIcon ? <img src={formData.sourceIcon} /> : <Icon name="image" className="w-3 h-3 text-white/20" />}
                                                        </div>
                                                        <select className="modal-input-base flex-1 text-[11px] font-bold px-2" value={formData.source} onChange={e=>{ const v=e.target.value; const s=customSources.find(x=>x.name===v); setFormData({...formData, source: v, sourceIcon: s?s.icon:formData.sourceIcon}); }}>
                                                            <option value="">- 來源 -</option>
                                                            {customSources.map(s=><option key={s.name} value={s.name}>{s.name}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                                <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={async (e)=>{ if(e.target.files[0]) { const c = await compressImage(URL.createObjectURL(e.target.files[0]), 100); setFormData(p=>({...p, [lastSelectedImgZone==='source'?'sourceIcon':'cover']: c})); } }} />
                                            </div>

                                            {/* 右側詳細區域 */}
                                            <div className="md:col-span-8 space-y-5 border-l border-white/5 pl-8">
                                                <div>
                                                    <label className="block text-[11px] font-black text-[#ffbae9]/60 uppercase mb-2">-名稱-</label>
                                                    <AutoResizeTextarea className="modal-input-base w-full font-black text-white text-lg" value={formData.name} onChange={v=>setFormData({...formData, name: v})} isError={isNameDuplicate} />
                                                </div>
                                                <div>
                                                    <label className="block text-[11px] font-black text-white/40 uppercase mb-2">-備註-</label>
                                                    <input className="modal-input-base w-full font-black text-[11px] p-1.5" value={formData.notes} onChange={e=>setFormData({...formData, notes: e.target.value})} />
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <ProgressInputField label="總集數" value={formData.totalEpisodes} unitSuggestions={unitSuggestions} onChange={v=>setFormData({...formData, totalEpisodes:v})} />
                                                    <ProgressInputField label="更新至" value={formData.updatedEpisodes} unitSuggestions={unitSuggestions} onChange={v=>setFormData({...formData, updatedEpisodes:v})} />
                                                </div>
                                                
                                                <div className="flex gap-6 items-start">
                                                    <div className="flex-1 space-y-4">
                                                        <div>
                                                            <label className="block text-[11px] font-black text-white/40 uppercase mb-2">-更新星期-</label>
                                                            {showTimeSettings ? <select className="modal-input-base w-full text-[11px] font-bold px-2" value={formData.updateDay} onChange={e=>setFormData({...formData, updateDay: e.target.value})}><option value="">-</option>{['一','二','三','四','五','六','日'].map(d=><option key={d} value={d}>每周 ({d})</option>)}</select> : <div className="plus-toggle-btn" onClick={()=>setShowTimeSettings(true)}><Icon name="plus" className="w-4 h-4" /></div>}
                                                        </div>
                                                        {formData.watchingBy.length > 0 && (
                                                            <div className="space-y-4 pt-2 border-t border-white/5">
                                                                {formData.watchingBy.map(name => (
                                                                    <ProgressInputField 
                                                                        key={name}
                                                                        label={`${name} 的觀看進度`} 
                                                                        labelStyle={{ color: nameColorMap[name] || '#ffbae9' }}
                                                                        value={formData.watchedProgress[name] || { ...emptyProgress }} 
                                                                        unitSuggestions={unitSuggestions} 
                                                                        onChange={v => setFormData({ 
                                                                            ...formData, 
                                                                            watchedProgress: { ...formData.watchedProgress, [name]: v } 
                                                                        })} 
                                                                    />
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="flex-1 space-y-4">
                                                        <div>
                                                            <label className="block text-[11px] font-black text-[#ffbae9]/80 uppercase mb-2">-更新時間-</label>
                                                            {showTimeSettings ? <TimeSelector value={formData.updateTime} onChange={nt=>setFormData({...formData, updateTime: nt})} /> : <div className="plus-toggle-btn" onClick={()=>setShowTimeSettings(true)}><Icon name="plus" className="w-4 h-4" /></div>}
                                                        </div>
                                                        <div>
                                                            <ProgressInputField label="已付費至" labelClass="text-yellow-400" value={formData.paidProgress} unitSuggestions={unitSuggestions} onChange={v=>setFormData({...formData, paidProgress:v})} />
                                                        </div>
                                                    </div>
                                                </div>

                                                <div>
                                                    <label className="block text-[11px] font-black text-white/40 uppercase mb-2">-連結-</label>
                                                    <input className="modal-input-base w-full font-mono text-[11px] text-cyan-500" value={formData.url} onChange={e=>setFormData({...formData, url: e.target.value})} />
                                                </div>
                                                <div className="flex gap-6 items-end">
                                                    <div className="flex-1">
                                                        <label className="block text-[11px] font-black text-white/40 uppercase mb-2">-誰在看-</label>
                                                        <div className="inline-flex flex-wrap gap-1.5 p-1.5 bg-black/30 border border-white/5 rounded min-h-[36px] w-fit">
                                                            {displayMembers.map(n => (
                                                                <div 
                                                                    key={n} 
                                                                    onClick={() => {
                                                                        const isSelected = formData.watchingBy.includes(n);
                                                                        let newWatchingBy = isSelected ? formData.watchingBy.filter(x => x !== n) : [...formData.watchingBy, n];
                                                                        let newWatchedProgress = { ...formData.watchedProgress };
                                                                        if (!isSelected && !newWatchedProgress[n]) { newWatchedProgress[n] = { ...emptyProgress }; }
                                                                        setFormData({ ...formData, watchingBy: newWatchingBy, watchedProgress: newWatchedProgress });
                                                                    }} 
                                                                    className={`watcher-tag !py-1 !px-3 ${formData.watchingBy.includes(n) ? 'active' : ''}`}
                                                                >
                                                                    {n}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    <div className="flex-1">
                                                        <label className="block text-[11px] font-black text-white/40 uppercase mb-2">-最後更新-</label>
                                                        {showManualUpdateInput ? (
                                                            <div className="flex items-center gap-2">
                                                                <input className="modal-input-base w-full font-black text-[11px] p-1.5" value={formData.manualUpdatedAt} onChange={e=>setFormData({...formData, manualUpdatedAt: e.target.value})} />
                                                                <button type="button" onClick={() => { setFormData({...formData, manualUpdatedAt: ""}); setShowManualUpdateInput(false); }} className="text-white/20 hover:text-red-400 flex-shrink-0"><Icon name="x" className="w-3 h-3" /></button>
                                                            </div>
                                                        ) : (
                                                            <div className="plus-toggle-btn" onClick={()=>setShowManualUpdateInput(true)}><Icon name="plus" className="w-4 h-4" /></div>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="flex gap-4 pt-4 border-t border-white/5">
                                                    <button type="button" onClick={()=>setIsModalOpen(false)} className="flex-1 py-4 bg-white/5 font-black rounded uppercase text-[11px] hover:bg-white/10 transition-all">取消修改</button>
                                                    <button type="submit" className="flex-[2] py-4 bg-[#ffbae9] text-[#3f5968] font-black rounded shadow-lg uppercase text-[11px] hover:bg-white transition-all">確認提交資料</button>
                                                </div>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {showDuplicateConfirm && <div className="fixed inset-0 z-[800] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md"><div className="bg-[#0b0e14] border border-red-500/50 w-full max-sm p-10 rounded-sm text-center shadow-2xl"><Icon name="alert-circle" className="w-12 h-12 text-red-500 mx-auto mb-4" /><h4 className="text-red-500 font-black mb-2 uppercase text-lg tracking-widest">發現同名項目</h4><p className="text-sm text-slate-300 mb-8 font-bold">您確定要建立/儲存同名項目嗎？</p><div className="flex gap-4"><button onClick={()=>setShowDuplicateConfirm(false)} className="flex-1 py-3 bg-white/5 text-[12px] font-black rounded border border-white/5 uppercase">返回修改</button><button onClick={proceedSave} className="flex-1 py-3 bg-red-600 text-white text-[12px] font-black rounded shadow-lg uppercase">仍要儲存</button></div></div></div>}
                    {isCropping && <ImageCropperModal imageSrc={rawImageData || formData.cover} onCrop={c=>{setFormData({...formData, cover:c}); setIsCropping(false); showNotify("封面已優化");}} onCancel={()=>setIsCropping(false)} />}
                    {deleteGameTarget && <div className="fixed inset-0 z-[700] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md"><div className="bg-[#0b0e14] border border-red-500/50 w-full max-sm p-10 rounded-sm text-center shadow-2xl"><Icon name="alert-triangle" className="w-12 h-12 text-red-500 mx-auto mb-4" /><h4 className="text-red-500 font-black mb-2 uppercase text-lg">確認刪除？</h4><p className="text-sm text-slate-300 mb-8 font-bold italic">{deleteGameTarget.name}</p><div className="flex gap-4"><button onClick={()=>setDeleteGameTarget(null)} className="flex-1 py-3 bg-white/5 text-[12px] font-black rounded border border-white/5 uppercase">取消</button><button onClick={()=>handleDeleteGame(deleteGameTarget.id)} className="flex-1 py-3 bg-red-600 text-white text-[12px] font-black rounded shadow-lg uppercase">確定</button></div></div></div>}
                    {showClearConfirm && <div className="fixed inset-0 z-[600] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm"><div className="bg-[#0b0e14] border border-red-500/30 w-full max-w-xs p-8 rounded-sm shadow-2xl text-center"><h4 className="text-red-500 font-black mb-8 uppercase tracking-widest">確定要清空所有內容嗎？</h4><div className="flex gap-3"><button onClick={()=>setShowClearConfirm(false)} className="flex-1 py-2 bg-white/5 font-black text-[11px] rounded border border-white/5">取消</button><button onClick={handleClearAllData} className="flex-1 py-2 bg-red-600 text-white font-black text-[11px] rounded shadow-lg">確定</button></div></div></div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
